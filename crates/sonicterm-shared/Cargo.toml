[package]
name = "sonicterm-shared"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "SonicTerm Terminal — shared: window, tabs, panes, app loop"

[lints]
workspace = true

[features]
default = []
# Forwards to sonicterm-core/ssh so the bin crates can enable SSH at build time
# with a single `--features ssh` on the workspace.
ssh = ["sonicterm-core/ssh"]

[dependencies]
sonicterm-core.workspace = true
sonicterm-text.workspace = true
sonicterm-gpu.workspace = true
sonicterm-ui.workspace = true
sonicterm-grid.workspace = true
sonicterm-render-model.workspace = true
sonicterm-cfg.workspace = true
winit.workspace = true
raw-window-handle.workspace = true
wgpu.workspace = true
glyphon.workspace = true
cosmic-text.workspace = true
swash.workspace = true
fontdb.workspace = true
bytemuck.workspace = true
parking_lot.workspace = true
crossbeam-channel.workspace = true
anyhow.workspace = true
thiserror.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
pollster.workspace = true
arboard.workspace = true
regex = { workspace = true }
notify.workspace = true
lru = "0.12"
fluent-bundle = "0.15"
fluent-langneg = "0.13"
unic-langid = { version = "0.9", features = ["macros"] }
intl-memoizer = "0.5"
sys-locale = "0.3"
serde.workspace = true
serde_json = "1"
nucleo-matcher = "0.3"

[dev-dependencies]
sonicterm-io.workspace = true
sonicterm-types.workspace = true
sonicterm-vt.workspace = true
tempfile = "3"
image = { version = "0.25", default-features = false, features = ["png"] }
image_hasher = "3"
criterion = { version = "0.5", default-features = false, features = ["cargo_bench_support"] }

[[example]]
name = "pane_smoke"
path = "examples/pane_smoke.rs"

[[bench]]
name = "render_throughput"
harness = false

[package]
name = "sonicterm-text"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "SonicTerm Terminal — headless text layer: shaping, swash rasterization, glyph atlas, per-row cache"

[lints]
workspace = true

[dependencies]
sonicterm-types.workspace = true
cosmic-text.workspace = true
swash.workspace = true
fontdb.workspace = true
bytemuck.workspace = true
lru = "0.16"
tracing.workspace = true
# #610 sym-1: SIMD-accelerated bitmap resampler used at atlas-insert time
# for Nerd Font icon tiles. WezTerm uses the `resize` crate
# (window/src/bitmaps/mod.rs:380-394) with Lanczos3 (downscale) +
# Mitchell (upscale); fast_image_resize exposes the equivalent filter
# set with portable SIMD (SSE4.1/AVX2/NEON) and a smaller dep graph.
# License: MIT/Apache-2.0 (both allowed in deny.toml).
fast_image_resize = { version = "5.1", default-features = false }

[dev-dependencies]
sonicterm-grid.workspace = true

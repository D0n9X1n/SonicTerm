# ==========================================================================
# §8b Nerd-font / ligature / PUA visual cases (covers #611, catches #615)
# OCR-spacing approach (replaces earlier dHash attempt): dHash references
# captured on current buggy main would have frozen the bug and could not
# detect #615. Instead, we OCR a body-cropped screenshot and assert on
# inter-pipe spacing: a glyph that incorrectly renders at 1 cell collapses
# adjacent ASCII anchors and the regex fails. Cases B+C are EXPECTED TO
# FAIL on current main (proves they catch #615) and will PASS once #615
# is fixed and PUA/ligature glyphs render at their correct 2-cell width.
# ==========================================================================

[[case]]
id = "ligature-spans-two-cells"
shell = "bash"
section = 8
title = "Powerline triangle U+E0B0 renders at 2 cells (OCR-spacing)"
applies_to = ["mac"]
covers_bugs = ["#611", "#615"]
covers_landmines = []
setup = ["clear", "wait:0.3"]
keystrokes = [
  { kind = "text", value = "printf '|\\xee\\x82\\xb0|END\\n'" },
  { kind = "key", value = "enter" },
  { kind = "wait", value = 0.6 },
]
expect = [
  { kind = "ocr_line_regex", marker = "END", regex = "\\|.+\\|END", note = "Catches #615: U+E0B0 must render at 2 cells; buggy 1-cell render produces '||END' which fails this regex." },
]
fail_on = "OCR line containing END shows '||END' (no spacing) — U+E0B0 collapsed to 1 cell"

[[case]]
id = "pua-icons-consistent-widths"
shell = "bash"
section = 8
title = "Multiple PUA icons render at consistent 2-cell widths (OCR-spacing)"
applies_to = ["mac"]
covers_bugs = ["#611", "#615"]
covers_landmines = []
setup = ["clear", "wait:0.3"]
keystrokes = [
  { kind = "text", value = "printf '\\xee\\x80\\x82|\\xee\\x83\\xbb|\\xee\\x80\\x95|END\\n'" },
  { kind = "key", value = "enter" },
  { kind = "wait", value = 0.6 },
]
expect = [
  { kind = "ocr_line_regex", marker = "END", regex = "..\\|..\\|..\\|END", note = "Catches PUA width inconsistency. Each PUA icon must render at 2 cells, leaving a space (visible to OCR) between glyph and following pipe." },
]
fail_on = "OCR line lacks 2+ chars between each pipe — PUA icons rendering at < 2 cells"


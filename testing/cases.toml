# ==========================================================================
# §4 / land-mines  (covers #348 CSI IL/DL — nvim hold-j stale rows)
# ==========================================================================

[[case]]
id = "nvim-hold-j-scroll"
section = 4
title = "nvim hold-j on a large file leaves no stale rows (CSI IL/DL implemented)"
applies_to = ["mac"]
covers_bugs = ["#348"]
covers_landmines = ["csi-il-dl-not-noop"]
setup = ["clear", "wait:0.3"]
# Replay the exact byte pattern nvim batches under key-repeat: fill the screen,
# set DECSTBM, then issue CUP+DL+CUP+IL+print. Pre-fix this left the body
# rows stale because IL/DL were silently dropped into the wildcard arm.
# Wrapped in ?2026 h/l (synchronized output) to also exercise the new mode-arm.
keystrokes = [
  { kind = "text", value = "printf '\\033[?2026hAAAAAAAAAA\\nBBBBBBBBBB\\nCCCCCCCCCC\\nDDDDDDDDDD\\nEEEEEEEEEE\\033[2;4r\\033[2;1H\\033[1M\\033[4;1H\\033[1LNEW\\033[?2026l\\n'" },
  { kind = "key", value = "enter" },
  { kind = "wait", value = 1.0 },
]
expect = [
  { kind = "screenshot", region = "body" },
  { kind = "text-in-region", region = "body", value = "NEW" },
]
fail_on = "Body rows still show the original B/C/D layout — IL/DL silently dropped, stale rows above NEW."

# ==========================================================================
# §4 / land-mines  (covers #359 CSI ECH/CHA/REP/VPA/DCH/ICH —
# nvim+neo-tree per-row tail-clear smear)
# ==========================================================================

[[case]]
id = "csi-ech-tail-clear-no-smear"
section = 4
title = "ECH clears row tail (neo-tree per-row repaint pattern, #359)"
applies_to = ["mac"]
covers_bugs = ["#359"]
covers_landmines = ["csi-ech-not-noop"]
setup = ["clear", "wait:0.3"]
# Replay the synthetic byte pattern neo-tree emits per row: write a long
# stale string, jump to mid-row, write a short label, then ECH the tail.
# Pre-fix the ECH was a no-op and the tail of the old string showed through.
keystrokes = [
  { kind = "text", value = "printf 'OLDOLDOLDOLDOLD\\033[1;4HNEW\\033[12X\\n'" },
  { kind = "key", value = "enter" },
  { kind = "wait", value = 0.6 },
]
expect = [
  { kind = "screenshot", region = "body" },
  { kind = "text-in-region", region = "body", value = "OLDNEW" },
]
fail_on = "Row still shows OLDOLD suffix after NEW — ECH silently dropped, neo-tree-style tail-clear no-op'd."


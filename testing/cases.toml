[meta]
schema_version = 1
description = "SonicTerm visual test cases. Single source of truth for mac.sh + windows.ps1."

# Schema:
#   [[case]]
#   id              kebab-case unique identifier
#   section         matches docs/RELEASE_TESTING.md section (1..37)
#   title           human-readable
#   applies_to      ["mac"] | ["windows"] | ["mac","windows"] | ["mac-manual"] | ["windows-manual"]
#   shell           OPTIONAL "bash" | "cmd" | "pwsh" | "cross" (default "cross").
#                   Marks which shell dialect the keystroke/text payloads target.
#                   Windows harness (run_case.ps1) uses this to force-spawn the
#                   child shell as bash.exe when shell="bash" (git-bash preferred,
#                   WSL fallback); SKIPs with exit 77 + reason `bash_unavailable`
#                   if neither is on PATH. Mac harness ignores this field
#                   (mac defaults to bash/zsh which handle the common subset of
#                   all four dialects). See #493 for the shell-dialect background.
#   requires_elevation OPTIONAL bool (default false). When true the windows
#                   harness (run_case.ps1) fast-fails BEFORE spawning
#                   sonicterm-windows if pwsh is not running as Administrator,
#                   logging `[FAIL unelevated_only]` and exiting 1. Avoids a
#                   30s+ wait on a UAC consent dialog the harness can't
#                   dismiss. Mac harness ignores this field. See #488.
#   covers_bugs     ["#196", ...]   — issues/PRs this case guards
#   covers_landmines ["try-lock-no-deadlock", ...]  — ids from CLAUDE.md §4
#   setup           array of step strings: "open-3-tabs", "clear", "type:echo hi", "enter", "wait:0.3"
#   keystrokes      array of {kind="key"|"text"|"wait", ...}
#   expect          array of {kind="tab-count"|"pane-count"|"text-in-region"|"pixel-near"|"dhash"|"process-count"|"screenshot"|"exit-code", ...}
#                   pixel-near supports optional sample="1x1" (default) or "3x3" (averages a 3x3 window — see #588)
#                   dhash compares an 8x8 perceptual hash of the screenshot against reference="testing/reference/<case>.png"
#                     with tolerance = max Hamming distance (default 8, range 0..64). Structural check that tolerates
#                     window-placement variance where pixel-near coords drift outside the region of interest (#588 follow-up).
#   fail_on         free-text description of visible failure

# ==========================================================================
# §1 Rendering baseline
# ==========================================================================

[[case]]
id = "render-baseline-cells-cursor-cjk-emoji-bg"
shell = "bash"
section = 1
title = "Cells render with cursor, RED-BG, CJK, emoji, theme bg match"
applies_to = ["mac", "windows"]
covers_bugs = ["#161", "#163", "#42"]
covers_landmines = ["set-rich-text-shaping"]
setup = ["clear", "wait:0.3"]
keystrokes = [
  { kind = "text", value = "printf '\\033[41mRED-BG\\033[0m echo 中文 🎉 sonic\\n' && date" },
  { kind = "key", value = "enter" },
  { kind = "wait", value = 1.0 },
]
expect = [
  { kind = "screenshot", region = "window" },
  { kind = "text-in-region", region = "body", value = "中文" },
  { kind = "text-in-region", region = "body", value = "RED-BG" },
  { kind = "dhash", reference = "testing/reference/render-baseline-cells-cursor-cjk-emoji-bg.png", tolerance = 20, note = "Structural fingerprint of cells+CJK+emoji+RED-BG layout (#588 follow-up: replaces fragile pixel-near coords drifting outside RED-BG region; tol=20 absorbs cursor-blink + window-placement variance observed across runs)" },
]
fail_on = "Tofu boxes, missing cursor, RED-BG cells render with theme bg instead of red, theme bg gamma-washed"


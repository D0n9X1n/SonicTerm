# cargo-deny configuration — supply-chain policy

[advisories]
version = 2
yanked = "warn"
ignore = [
    # bincode 1.x is permanently unmaintained per RUSTSEC-2025-0141 but the
    # upstream team explicitly considers 1.3.3 a complete, stable release.
    # Only pulled in by sonicterm-mux; migration tracked separately.
    "RUSTSEC-2025-0141",
    # proc-macro-error is unmaintained but reaches us transitively through
    # gtk3-macros → muda (Windows menu bar). No safe upgrade is published
    # upstream; revisit when muda migrates off the gtk 0.18 stack.
    "RUSTSEC-2024-0370",
    # gtk-rs GTK3 bindings (gtk/gdk/atk/cairo-rs/gdk-pixbuf/gio/pango glue)
    # are no longer maintained. Same transitive root as above — muda still
    # depends on gtk 0.18 on Windows. Cluster tracked for the muda migration.
    "RUSTSEC-2024-0412",
    "RUSTSEC-2024-0413",
    "RUSTSEC-2024-0415",
    "RUSTSEC-2024-0416",
    "RUSTSEC-2024-0418",
    "RUSTSEC-2024-0419",
    "RUSTSEC-2024-0420",
    # lru 0.12.5 unsoundness — pulled in transitively by wgpu/glyphon stack;
    # no fixed version published yet. Track upstream; revisit on next bump.
    "RUSTSEC-2026-0002",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "0BSD",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# cargo-deny configuration — supply-chain policy

[advisories]
version = 2
yanked = "warn"
ignore = [
    # bincode 1.x is permanently unmaintained per RUSTSEC-2025-0141 but the
    # upstream team explicitly considers 1.3.3 a complete, stable release.
    # Only pulled in by sonic-mux; migration tracked separately.
    "RUSTSEC-2025-0141",
]

[licenses]
version = 2
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "MPL-2.0",
    "CC0-1.0",
    "OpenSSL",
    "BSL-1.0",
    "0BSD",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"

[sources]
unknown-registry = "deny"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

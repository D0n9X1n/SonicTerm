# SonicTerm default keymap — Linux.
#
# Design: `alt` is the SonicTerm app-modifier on Linux, mirroring `cmd`
# (`super`) on macOS. macOS keeps Ctrl for the shell and uses Cmd for app
# chords, which is conflict-free. Linux has no Cmd key (and the real Super
# key is usually owned by the window manager), so `alt` takes that role:
# Ctrl+<letter> stays with the shell/readline (Ctrl+C = SIGINT, Ctrl+R =
# history search, Ctrl+W = kill word, Ctrl+H = Backspace, …) and never gets
# stolen. Every binding below is the macOS chord with `super` → `alt`.
#
# Modifier-order note: chords are matched against a normalized string in the
# fixed order super+ctrl+alt+shift+key (see key_encoding::chord_string), so
# `alt+shift+x` and `ctrl+alt+shift+x` are written in that exact order.
#
# Caveat: `alt+<letter>` shadows the shell's Meta bindings (Alt+F/B/D word
# motions) — SonicTerm intercepts these chords before the PTY sees them.
# Keys not listed fall through to the terminal.

[meta]
name = "sonicterm-linux-default"
version = "1.0"

# --- Tabs ---
[[binding]]
keys = "alt+t"
action = "new_tab"

# WezTerm's Windows/Linux SpawnTab chord — also bound so the same muscle
# memory works whichever OS the keyboard came from.
[[binding]]
keys = "alt+shift+t"
action = "new_tab"

[[binding]]
keys = "alt+w"
action = "close_active_pane_or_tab"

[[binding]]
keys = "alt+shift+]"
action = "next_tab"

[[binding]]
keys = "alt+shift+["
action = "prev_tab"

# Alt+Left / Alt+Right — mirrors macOS Cmd+Left/Right tab navigation.
[[binding]]
keys = "alt+left"
action = "prev_tab"

[[binding]]
keys = "alt+right"
action = "next_tab"

[[binding]]
keys = "alt+1"
action = { activate_tab = 0 }

[[binding]]
keys = "alt+2"
action = { activate_tab = 1 }

[[binding]]
keys = "alt+3"
action = { activate_tab = 2 }

[[binding]]
keys = "alt+4"
action = { activate_tab = 3 }

[[binding]]
keys = "alt+5"
action = { activate_tab = 4 }

[[binding]]
keys = "alt+6"
action = { activate_tab = 5 }

[[binding]]
keys = "alt+7"
action = { activate_tab = 6 }

[[binding]]
keys = "alt+8"
action = { activate_tab = 7 }

[[binding]]
keys = "alt+9"
action = "activate_last_tab"

# --- Splits ---
[[binding]]
keys = "alt+d"
action = "split_right"

[[binding]]
keys = "alt+shift+d"
action = "split_down"

[[binding]]
keys = "alt+shift+w"
action = "close_pane"

[[binding]]
keys = "alt+shift+z"
action = "toggle_pane_zoom"

[[binding]]
keys = "alt+shift+b"
action = { toggle_broadcast = { scope = "tab" } }

[[binding]]
keys = "ctrl+alt+shift+b"
action = { toggle_broadcast = { scope = "all_tabs" } }

# --- Pane focus (vim-style) ---
[[binding]]
keys = "alt+shift+h"
action = { focus_pane = "left" }

[[binding]]
keys = "alt+shift+j"
action = { focus_pane = "down" }

[[binding]]
keys = "alt+shift+k"
action = { focus_pane = "up" }

[[binding]]
keys = "alt+shift+l"
action = { focus_pane = "right" }

# Arrow-key split resize: nudge the active divider by 5%.
[[binding]]
keys = "alt+shift+left"
action = "resize_pane_left"

[[binding]]
keys = "alt+shift+right"
action = "resize_pane_right"

[[binding]]
keys = "alt+shift+up"
action = "resize_pane_up"

[[binding]]
keys = "alt+shift+down"
action = "resize_pane_down"

# --- Clipboard ---
[[binding]]
keys = "alt+["
action = "enter_copy_mode"

[[binding]]
keys = "alt+c"
action = "copy_to_clipboard"

[[binding]]
keys = "alt+v"
action = "paste_from_clipboard"

# --- Font size ---
[[binding]]
keys = "alt+="
action = "increase_font_size"

# Some keyboards/layouts deliver `+` as the character on Shift+= — bind
# both so font-zoom-in works regardless of which the OS surfaces.
[[binding]]
keys = "alt+shift+="
action = "increase_font_size"

[[binding]]
keys = "alt++"
action = "increase_font_size"

[[binding]]
keys = "alt+-"
action = "decrease_font_size"

[[binding]]
keys = "alt+0"
action = "reset_font_size"

# --- Window ---
[[binding]]
keys = "alt+n"
action = "new_window"

# F11 — Linux convention for full-screen toggle, kept alongside the
# macOS-mirrored Alt+Enter chord below.
[[binding]]
keys = "f11"
action = "toggle_fullscreen"

[[binding]]
keys = "alt+shift+f"
action = "toggle_fullscreen"

# Mirrors macOS Cmd+Enter (WezTerm's View → Enter Full Screen).
[[binding]]
keys = "alt+enter"
action = "toggle_fullscreen"

# --- Search / Palette ---
[[binding]]
keys = "alt+f"
action = "open_search"

[[binding]]
keys = "alt+shift+p"
action = "open_command_palette"

# Quick select URL hints.
[[binding]]
keys = "alt+shift+space"
action = "enter_quick_select"

# --- Scrolling ---
[[binding]]
keys = "alt+up"
action = { scroll = "line_up" }

[[binding]]
keys = "alt+down"
action = { scroll = "line_down" }

[[binding]]
keys = "alt+pageup"
action = { scroll = "page_up" }

[[binding]]
keys = "alt+pagedown"
action = { scroll = "page_down" }

[[binding]]
keys = "alt+home"
action = { scroll = "to_top" }

[[binding]]
keys = "alt+end"
action = { scroll = "to_bottom" }

# --- Reload config ---
[[binding]]
keys = "alt+shift+r"
action = "reload_config"

# Bare alt+r mirrors the macOS Cmd+R alias so users don't need Shift.
[[binding]]
keys = "alt+r"
action = "reload_config"

# --- SSH client (example; uncomment + edit target to enable) ---
# Requires building SonicTerm with `--features sonicterm-io/ssh`.
# [[binding]]
# keys = "alt+shift+s"
# action = { open_ssh_pane = "alice@dev.example.com:22" }

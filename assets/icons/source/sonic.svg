<?xml version="1.0" encoding="UTF-8"?>
<!--
  Sonic Terminal — Official App Icon
  ==================================
  Concept   Terminal window in profile, racing through cyan light trails.
            The window contains the iconic shell prompt `>_`.
  Palette   navy #0A1428 → #0E1A33 (squircle bg)
            cyan glow  #5BD3F8 → #1E90F0  (window outline + trails)
            white core #F4FBFF             (inner stroke highlight)
  Geometry  1024×1024 master, iOS-style squircle (40% corner radius).
            Designed to scale cleanly from 16px to 1024px.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background squircle -->
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0F1B36"/>
      <stop offset="100%" stop-color="#070D1C"/>
    </linearGradient>

    <!-- Cyan-blue gradient for the outline + trails -->
    <linearGradient id="cyan" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%"   stop-color="#7FE8FF"/>
      <stop offset="55%"  stop-color="#3DB8FE"/>
      <stop offset="100%" stop-color="#1E6EE6"/>
    </linearGradient>
    <linearGradient id="trail" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#7FE8FF" stop-opacity="0"/>
      <stop offset="35%"  stop-color="#5BD3F8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1E90F0" stop-opacity="0.95"/>
    </linearGradient>
    <linearGradient id="outline-highlight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#F4FBFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F4FBFF" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Outer neon glow filter for outline + trails -->
    <filter id="neon" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b1"/>
      <feGaussianBlur stdDeviation="18" result="b2"/>
      <feMerge>
        <feMergeNode in="b2"/>
        <feMergeNode in="b1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="soft-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- iOS-style squircle clip — superellipse approximation -->
    <clipPath id="squircle">
      <path d="M 512 16
               C 880 16 1008 144 1008 512
               C 1008 880 880 1008 512 1008
               C 144 1008 16 880 16 512
               C 16 144 144 16 512 16 Z"/>
    </clipPath>
  </defs>

  <!-- ===== Squircle background ===== -->
  <g clip-path="url(#squircle)">
    <rect width="1024" height="1024" fill="url(#bg)"/>

    <!-- Subtle top sheen -->
    <ellipse cx="512" cy="-80" rx="640" ry="220" fill="#FFFFFF" opacity="0.04"/>

    <!-- =========== Speed trails (right side) ============ -->
    <!-- Each trail: thin rounded rect with cyan gradient + neon glow.
         Pattern: dense in middle row, sparser top/bottom, all start in
         the window area and bleed off the right edge of the squircle. -->
    <g filter="url(#neon)">
      <!-- top band -->
      <rect x="610" y="280" width="320" height="14" rx="7" fill="url(#trail)"/>
      <rect x="740" y="318" width="220" height="10" rx="5" fill="url(#trail)"/>
      <rect x="660" y="350" width="300" height="14" rx="7" fill="url(#trail)"/>

      <!-- middle (dense) -->
      <rect x="600" y="392" width="380" height="18" rx="9" fill="url(#trail)"/>
      <rect x="690" y="430" width="270" height="12" rx="6" fill="url(#trail)"/>
      <rect x="620" y="460" width="370" height="16" rx="8" fill="url(#trail)"/>
      <rect x="700" y="498" width="280" height="14" rx="7" fill="url(#trail)"/>
      <rect x="640" y="528" width="340" height="18" rx="9" fill="url(#trail)"/>
      <rect x="690" y="566" width="290" height="12" rx="6" fill="url(#trail)"/>
      <rect x="620" y="596" width="370" height="16" rx="8" fill="url(#trail)"/>
      <rect x="700" y="634" width="270" height="12" rx="6" fill="url(#trail)"/>

      <!-- bottom band -->
      <rect x="650" y="676" width="320" height="14" rx="7" fill="url(#trail)"/>
      <rect x="720" y="712" width="240" height="10" rx="5" fill="url(#trail)"/>
      <rect x="640" y="744" width="290" height="12" rx="6" fill="url(#trail)"/>
    </g>

    <!-- =========== Terminal window frame ============ -->
    <!-- Outer cyan stroke, left-side only (right side dissolves into trails).
         Rounded corners, no fill. -->
    <g filter="url(#neon)">
      <!-- Window outline: top, left, bottom — right is "cut" by trails -->
      <path d="M 220 250
               L 700 250
               L 700 300
               L 220 300
               L 220 760
               L 700 760
               L 700 720"
            fill="none"
            stroke="url(#cyan)"
            stroke-width="14"
            stroke-linejoin="round"
            stroke-linecap="round"/>
      <!-- Title-bar separator (the horizontal line under the dots) -->
      <line x1="220" y1="338" x2="700" y2="338"
            stroke="url(#cyan)" stroke-width="8" stroke-linecap="round" opacity="0.95"/>
    </g>

    <!-- Inner highlight stroke for crispness -->
    <g>
      <path d="M 220 250
               L 700 250
               L 700 300
               L 220 300
               L 220 760
               L 700 760
               L 700 720"
            fill="none"
            stroke="url(#outline-highlight)"
            stroke-width="3"
            stroke-linejoin="round"
            stroke-linecap="round"/>
    </g>

    <!-- =========== Window dots (traffic lights — cyan-tinted) ============ -->
    <g filter="url(#soft-glow)">
      <circle cx="278" cy="294" r="16" fill="#5BD3F8"/>
      <circle cx="338" cy="294" r="16" fill="#5BD3F8" opacity="0.85"/>
      <circle cx="398" cy="294" r="16" fill="#5BD3F8" opacity="0.75"/>
    </g>

    <!-- =========== Shell prompt `>_` ============ -->
    <g filter="url(#neon)">
      <!-- Chevron `>` — two strokes meeting at a point -->
      <path d="M 290 470
               L 410 555
               L 290 640"
            fill="none"
            stroke="url(#cyan)"
            stroke-width="28"
            stroke-linejoin="round"
            stroke-linecap="round"/>
      <!-- Cursor underscore `_` to the right of the chevron -->
      <rect x="440" y="618" width="100" height="22" rx="6" fill="url(#cyan)"/>
    </g>
    <!-- Chevron inner highlight -->
    <path d="M 290 470 L 410 555 L 290 640"
          fill="none"
          stroke="#F4FBFF"
          stroke-width="6"
          stroke-linejoin="round"
          stroke-linecap="round"
          opacity="0.85"/>
    <rect x="440" y="618" width="100" height="22" rx="6" fill="#F4FBFF" opacity="0.45"/>

  </g>

  <!-- ===== Squircle outer rim (subtle white ring for definition) ===== -->
  <path d="M 512 16
           C 880 16 1008 144 1008 512
           C 1008 880 880 1008 512 1008
           C 144 1008 16 880 16 512
           C 16 144 144 16 512 16 Z"
        fill="none"
        stroke="#FFFFFF"
        stroke-opacity="0.08"
        stroke-width="2"/>
</svg>

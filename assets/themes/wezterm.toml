name = "WezTerm Default"
appearance = "dark"

[colors]
background    = "#141617"
foreground    = "#d5c4a1"
cursor        = "#52ad70"
cursor_text   = "#141617"
selection_bg  = "#27414d"
selection_fg  = "#d5c4a1"

# ANSI palette mirrors WezTerm's built-in "Gruvbox dark, hard (base16)"
# color scheme, which is what the user selects via
#   config.color_scheme = "Gruvbox dark, hard (base16)"
# in their wezterm.lua. Values pinned for exact parity.
[colors.ansi]
black   = "#1d2021"
red     = "#cc241d"
green   = "#98971a"
yellow  = "#d79921"
blue    = "#458588"
magenta = "#b16286"
cyan    = "#689d6a"
white   = "#a89984"

[colors.bright]
black   = "#928374"
red     = "#fb4934"
green   = "#b8bb26"
yellow  = "#fabd2f"
blue    = "#83a598"
magenta = "#d3869b"
cyan    = "#8ec07c"
white   = "#ebdbb2"

[colors.tab]
bar_bg          = "#141617"
active_bg       = "#141617"
active_fg       = "#fabd2f"
inactive_bg     = "#141617"
inactive_fg     = "#928374"
hover_bg        = "#1c1f20"
hover_fg        = "#d5c4a1"
close_button_fg = "#ff5555"

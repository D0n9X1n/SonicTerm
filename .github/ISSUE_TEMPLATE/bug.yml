name: Bug report
description: Something doesn't work
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: SonicTerm version
      placeholder: v0.1.0 / commit SHA
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: OS
      options: [macOS 14, macOS 15, Windows 11, Other]
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Set `RUST_LOG=debug` for verbose output

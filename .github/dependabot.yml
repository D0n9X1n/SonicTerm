version: 2
updates:
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels: ["dependencies", "rust"]
    # Only patch bumps and security advisories — major / minor cascades
    # cause flood-of-PRs noise on an early-stage repo. Manual bumps still
    # happen via PR when we actually want them.
    allow:
      - dependency-type: "all"
        update-type: "version-update:semver-patch"
    groups:
      patch-updates:
        update-types: ["patch"]
    # #550: fluent-rs stack is locked together. fluent-bundle 0.16 pins
    # fluent-langneg ^0.13 and unic-langid ^0.9. Re-open #550 to remove
    # this ignore when fluent-bundle ships a fluent-langneg 0.14 (icu-locid)
    # compatible release.
    ignore:
      - dependency-name: "fluent-langneg"
        versions: [">=0.14"]
      - dependency-name: "fluent-bundle"
        versions: [">=0.17"]
      - dependency-name: "unic-langid"
        versions: [">=0.10"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    open-pull-requests-limit: 2
    labels: ["dependencies", "ci"]
    allow:
      - dependency-type: "all"
        update-type: "version-update:semver-patch"

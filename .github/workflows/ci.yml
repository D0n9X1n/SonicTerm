name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_INCREMENTAL: 0

jobs:
  unit-tests:
    name: ${{ matrix.os }} / unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Cairo for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\setup-windows-cairo.ps1

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: unit-${{ matrix.os }}

      - name: Run unit tests
        run: cargo test --workspace --lib --bins

      - name: Run release-note unit test
        shell: bash
        run: bash scripts/test-release-notes.sh

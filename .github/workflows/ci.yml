name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_INCREMENTAL: 0

jobs:
  quick-gate:
    name: ${{ matrix.os }} / fmt+clippy+unit-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ${{ matrix.os }}

      - name: fmt check
        run: cargo fmt --all -- --check

      - name: no raw process exits
        shell: bash
        run: bash scripts/check-no-raw-process-exit.sh

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: unit + bin tests (skip integration tests/ folders)
        run: cargo test --workspace --lib --bins

      - name: contract docs drift (M8: fail)
        shell: bash
        run: bash tools/check-contract-docs.sh fail

      - name: landmines (M8: fail)
        shell: bash
        run: bash tools/check-landmines.sh fail

      - name: ownership (M8: fail)
        shell: bash
        run: bash tools/check-ownership.sh fail

  deny:
    name: cargo-deny (supply-chain)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_INCREMENTAL: 0

jobs:
  unit-tests:
    name: ${{ matrix.os }} / unit tests
    runs-on: ${{ matrix.os }}
    env:
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/vcpkg-binary-cache
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve vcpkg commit (for cache key)
        id: vcpkg
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $root = if ($env:VCPKG_INSTALLATION_ROOT) { $env:VCPKG_INSTALLATION_ROOT } else { "C:\vcpkg" }
          $sha = (git -C $root rev-parse HEAD).Trim()
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "image=$env:ImageVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Cache vcpkg binaries (Cairo)
        if: runner.os == 'Windows'
        uses: actions/cache@v4
        with:
          path: ${{ env.VCPKG_DEFAULT_BINARY_CACHE }}
          key: vcpkg-cairo-${{ runner.os }}-${{ steps.vcpkg.outputs.image }}-${{ steps.vcpkg.outputs.sha }}-${{ hashFiles('scripts/setup-windows-cairo.ps1') }}
          restore-keys: |
            vcpkg-cairo-${{ runner.os }}-

      - name: Install Cairo for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\setup-windows-cairo.ps1

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: unit-${{ matrix.os }}

      - name: Run unit tests
        run: cargo test --workspace --lib --bins

      - name: Run per-crate unit/build gate
        shell: bash
        run: bash scripts/check-workspace-crates.sh

      - name: Run release-note unit test
        shell: bash
        run: bash scripts/test-release-notes.sh

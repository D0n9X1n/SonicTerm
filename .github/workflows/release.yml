name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_INCREMENTAL: 0

jobs:
  unit-tests:
    name: ${{ matrix.os }} / unit tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable

      - name: Install Cairo for Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\scripts\setup-windows-cairo.ps1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-unit-${{ matrix.os }}
      - name: Run unit tests
        run: cargo test --workspace --lib --bins

      - name: Run release-note unit test
        shell: bash
        run: bash scripts/test-release-notes.sh

  build-mac-x86_64:
    name: Build macOS x86_64 binary
    runs-on: macos-15-intel
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Install native dependencies
        run: brew install cairo pkg-config

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-mac-x86_64

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin -p sonicterm-mac

      - uses: actions/upload-artifact@v5
        with:
          name: sonicterm-mac-x86_64
          path: target/x86_64-apple-darwin/release/sonicterm-mac

  build-mac-aarch64:
    name: Build macOS aarch64 binary
    runs-on: macos-14
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install native dependencies
        run: brew install cairo pkg-config

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-mac-aarch64

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin -p sonicterm-mac

      - uses: actions/upload-artifact@v5
        with:
          name: sonicterm-mac-aarch64
          path: target/aarch64-apple-darwin/release/sonicterm-mac

  package-mac:
    name: Package macOS dmg
    runs-on: macos-14
    needs: [build-mac-x86_64, build-mac-aarch64]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          name: sonicterm-mac-x86_64
          path: dist/x86_64

      - uses: actions/download-artifact@v5
        with:
          name: sonicterm-mac-aarch64
          path: dist/aarch64

      - name: Make universal binary
        run: |
          chmod +x dist/x86_64/sonicterm-mac dist/aarch64/sonicterm-mac
          lipo -create \
            dist/x86_64/sonicterm-mac \
            dist/aarch64/sonicterm-mac \
            -output dist/sonicterm-mac
          file dist/sonicterm-mac
          lipo -verify_arch x86_64 arm64 dist/sonicterm-mac

      - name: Build icons
        run: |
          brew install create-dmg librsvg imagemagick
          bash assets/icons/bake-icons.sh

      - name: Build dmg
        run: bash packaging/mac/make-dmg.sh dist/sonicterm-mac "${{ github.ref_name }}" mac-universal

      - uses: actions/upload-artifact@v5
        with:
          name: sonicterm-mac
          path: dist/*.dmg

  build-windows:
    name: Build Windows msi
    runs-on: windows-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install Cairo
        shell: pwsh
        run: .\scripts\setup-windows-cairo.ps1

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-windows

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Install WiX Toolset
        run: |
          choco install wixtoolset --no-progress -y
          "C:\Program Files (x86)\WiX Toolset v3.14\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc -p sonicterm-windows

      - name: Build msi
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Push-Location crates\sonicterm-windows
          cargo wix --package sonicterm-windows --no-build --nocapture --output ..\..\dist\
          Pop-Location

      - uses: actions/upload-artifact@v5
        with:
          name: sonicterm-windows
          path: dist/*.msi

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [package-mac, build-windows]
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Prepare downloadable release assets
        shell: bash
        run: |
          shopt -s nullglob
          dmg=(dist/*.dmg)
          msi=(dist/*.msi)
          if ((${#dmg[@]} == 0 || ${#msi[@]} == 0)); then
            echo "Expected both macOS .dmg and Windows .msi release assets in dist/" >&2
            find dist -maxdepth 2 -type f -print >&2
            exit 1
          fi
          (cd dist && shasum -a 256 *.dmg *.msi > SHA256SUMS.txt)
          ls -lh dist

      - name: Generate release notes
        run: bash scripts/release-notes.sh "${{ github.ref_name }}" > RELEASE_NOTES.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SonicTerm ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.dmg
            dist/*.msi
            dist/SHA256SUMS.txt
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

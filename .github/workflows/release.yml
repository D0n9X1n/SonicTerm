name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_INCREMENTAL: 0

jobs:
  # --- Quick-gate parity: fmt + clippy + unit/bin tests on both OSes --------
  quick-gate:
    name: ${{ matrix.os }} / fmt+clippy+unit-test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-latest]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.os }}
      - name: fmt check
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: unit + bin tests
        run: cargo test --workspace --lib --bins

  # --- Full integration tests + e2e examples + perf gate --------------------
  full-gate:
    name: full workspace tests + e2e examples + perf
    runs-on: macos-14
    needs: [quick-gate]
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-full-gate
      - name: full workspace tests (incl. integration)
        run: cargo test --workspace
      - name: pty_dump e2e
        run: |
          OUT=$(cargo run --example pty_dump -p sonicterm-core --release)
          echo "$OUT"
          echo "$OUT" | grep -q '\[e2e\] OK'
      - name: pty_dump_unicode e2e
        run: |
          OUT=$(cargo run --example pty_dump_unicode -p sonicterm-core --release)
          echo "$OUT"
          echo "$OUT" | grep -q '\[unicode-e2e\] OK'
      - name: Install vtebench (best-effort)
        shell: bash
        run: |
          cargo install vtebench --locked 2>/tmp/vtebench-install.log || {
            echo "::warning::vtebench install failed — bench will skip vtebench_* metrics."
            cat /tmp/vtebench-install.log || true
          }
      - name: perf-bench (CI mode — >20% regression fails)
        env:
          CI: "1"
        run: bash scripts/bench.sh --ci
      - name: release-testing checklist
        shell: bash
        run: |
          if [ -f scripts/check-release-testing.sh ]; then
            bash scripts/check-release-testing.sh
          else
            echo "::warning::scripts/check-release-testing.sh not present — skipping"
          fi

  # --- macOS build + .dmg (UNSIGNED — signing deferred pending certs) -------
  build-mac:
    name: Build macOS universal .dmg (unsigned)
    runs-on: macos-14
    needs: [full-gate]
    steps:
      - uses: actions/checkout@v5

      - name: Install rust + targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-mac

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin -p sonicterm-mac

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin -p sonicterm-mac

      - name: Make universal binary
        run: |
          mkdir -p dist
          lipo -create \
            target/x86_64-apple-darwin/release/sonicterm-mac \
            target/aarch64-apple-darwin/release/sonicterm-mac \
            -output dist/sonic
          file dist/sonic

      - name: Install create-dmg + librsvg + imagemagick
        run: brew install create-dmg librsvg imagemagick

      - name: Bake icon
        run: bash assets/icons/bake-icons.sh

      - name: Build .app + .dmg (unsigned)
        run: bash packaging/mac/make-dmg.sh dist/sonic "${{ github.ref_name }}"

      - name: Note unsigned build
        run: echo "::notice::Built UNSIGNED macOS .dmg — signing deferred pending Developer ID cert procurement"

      - uses: actions/upload-artifact@v5
        with:
          name: sonicterm-mac
          path: dist/*.dmg

  # --- Windows build + .msi (UNSIGNED — signing deferred pending certs) -----
  build-windows:
    name: Build Windows .msi (unsigned)
    runs-on: windows-latest
    needs: [full-gate]
    steps:
      - uses: actions/checkout@v5

      - name: Install rust + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-win

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc -p sonicterm-windows

      - name: Build .msi (unsigned)
        shell: bash
        run: |
          cd crates/sonicterm-windows
          cargo wix --no-build --nocapture --output ../../dist/

      - name: Note unsigned build
        shell: bash
        run: echo "::notice::Built UNSIGNED Windows .msi — signing deferred pending Azure Trusted Signing cert procurement"

      - uses: actions/upload-artifact@v5
        with:
          name: sonicterm-windows
          path: dist/*.msi

  publish:
    name: Publish GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          PREV=$(git tag --sort=-creatordate | grep -v "^${{ github.ref_name }}$" | head -1 || true)
          if [ -n "$PREV" ]; then
            echo "## Changes since $PREV" > body.md
            git log --pretty=format:"- %s (%h)" "${PREV}..${{ github.ref_name }}" >> body.md
          else
            echo "Initial SonicTerm Terminal release." > body.md
          fi
          {
            echo ""
            echo ""
            echo "_Note: this release ships UNSIGNED on both platforms. Code-signing is deferred past v1.0 pending cert procurement._"
          } >> body.md
          cat body.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: SonicTerm ${{ github.ref_name }}
          body_path: body.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

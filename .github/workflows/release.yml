name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0-alpha.1)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-mac:
    name: Build macOS universal .dmg
    runs-on: macos-14
    env:
      MACOS_CERT_P12_BASE64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
      MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
      MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
      MACOS_NOTARY_USER: ${{ secrets.MACOS_NOTARY_USER }}
      MACOS_NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
      MACOS_NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
    steps:
      - uses: actions/checkout@v5

      - name: Install rust + targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-mac

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin -p sonic-mac

      - name: Build aarch64
        run: cargo build --release --target aarch64-apple-darwin -p sonic-mac

      - name: Make universal binary
        run: |
          mkdir -p dist
          lipo -create \
            target/x86_64-apple-darwin/release/sonic-mac \
            target/aarch64-apple-darwin/release/sonic-mac \
            -output dist/sonic
          file dist/sonic

      - name: Install create-dmg + librsvg
        run: brew install create-dmg librsvg imagemagick

      - name: Bake icon
        run: bash assets/icons/bake-icons.sh

      - name: Import signing certificate
        if: env.MACOS_CERT_P12_BASE64 != ''
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.MACOS_CERT_PASSWORD }}

      - name: Build .app + .dmg
        run: bash packaging/mac/make-dmg.sh dist/sonic "${{ github.ref_name }}"

      - name: Notarize + staple .dmg
        if: env.MACOS_NOTARY_USER != '' && env.MACOS_SIGNING_IDENTITY != ''
        run: |
          DMG=$(find dist -maxdepth 1 -name '*.dmg' -print -quit)
          echo "==> Submitting $DMG to notarytool"
          xcrun notarytool submit "$DMG" \
            --apple-id "$MACOS_NOTARY_USER" \
            --password "$MACOS_NOTARY_PASSWORD" \
            --team-id "$MACOS_NOTARY_TEAM_ID" \
            --wait
          echo "==> Stapling notarization ticket"
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"

      - name: Note unsigned build
        if: env.MACOS_SIGNING_IDENTITY == ''
        run: echo "::notice::Built unsigned macOS .dmg (no MACOS_SIGNING_IDENTITY secret configured)"

      - uses: actions/upload-artifact@v5
        with:
          name: sonic-mac
          path: dist/*.dmg

  build-windows:
    name: Build Windows .msi
    runs-on: windows-latest
    env:
      WINDOWS_CERT_PFX_BASE64: ${{ secrets.WINDOWS_CERT_PFX_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v5

      - name: Install rust + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-win

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked

      - name: Build release
        run: cargo build --release --target x86_64-pc-windows-msvc -p sonic-windows

      - name: Build .msi
        shell: bash
        run: |
          cd crates/sonic-windows
          cargo wix --no-build --nocapture --output ../../dist/

      - name: Sign .msi
        if: env.WINDOWS_CERT_PFX_BASE64 != ''
        shell: pwsh
        run: |
          $pfxPath = Join-Path $env:RUNNER_TEMP "sonic-signing.pfx"
          [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_CERT_PFX_BASE64))
          $signtool = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\signtool.exe" |
                      Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $signtool) { throw "signtool.exe not found" }
          Write-Host "Using $($signtool.FullName)"
          Get-ChildItem dist\*.msi | ForEach-Object {
            & $signtool.FullName sign `
              /f $pfxPath `
              /p $env:WINDOWS_CERT_PASSWORD `
              /fd SHA256 `
              /tr http://timestamp.sectigo.com `
              /td SHA256 `
              /d "Sonic Terminal" `
              $_.FullName
            & $signtool.FullName verify /pa /v $_.FullName
          }
          Remove-Item $pfxPath -Force

      - name: Note unsigned build
        if: env.WINDOWS_CERT_PFX_BASE64 == ''
        shell: bash
        run: echo "::notice::Built unsigned Windows .msi (no WINDOWS_CERT_PFX_BASE64 secret configured)"

      - uses: actions/upload-artifact@v5
        with:
          name: sonic-windows
          path: dist/*.msi

  publish:
    name: Publish GitHub Release
    needs: [build-mac, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          path: dist
          merge-multiple: true

      - name: Generate changelog
        id: changelog
        run: |
          PREV=$(git tag --sort=-creatordate | grep -v "^${{ github.ref_name }}$" | head -1 || true)
          if [ -n "$PREV" ]; then
            echo "## Changes since $PREV" > body.md
            git log --pretty=format:"- %s (%h)" "${PREV}..${{ github.ref_name }}" >> body.md
          else
            echo "Initial Sonic Terminal release." > body.md
          fi
          cat body.md

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || inputs.tag }}
          name: Sonic ${{ github.ref_name || inputs.tag }}
          body_path: body.md
          files: dist/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

# landmines.toml
#
# Machine-checkable mirror of CLAUDE.md §4. Each entry pairs a class of
# bug with the file globs that can re-introduce it and the test paths
# that prove it stays dead. `tools/check-landmines.sh` is a diff-scoped
# pre-commit/CI gate; `crates/sonicterm-types/tests/contract_landmine_coverage.rs`
# is the TOML self-test that fails if a glob matches no files or a
# required test path doesn't exist.
#
# Editing this file without also updating docs/agents/_common.md (or
# vice versa) is a contract drift — keep them in lockstep.

[[landmine]]
id = "LM-001-try-lock-render-path"
description = "render path must use try_lock not lock to avoid AB-BA deadlock"
file_globs = [
  "crates/sonicterm-app/src/app/window_event.rs",
  "crates/sonicterm-app/src/app/child_window.rs",
  "crates/sonicterm-app/src/app/misc.rs",
]
required_test_paths = [
  "render_path_blocking_lock_trips_invariant",
]
clauseref = "CLAUDE.md §4 'Render uses try_lock'"
severity = "block"

[[landmine]]
id = "LM-002-pty-3ms-coalesce"
description = "PTY-thread redraw coalescer = 3 ms min + 128 KB byte flush; never per-byte redraw"
file_globs = [
  "crates/sonicterm-app/src/app/spawn_pane.rs",
]
required_test_paths = [
  "production_constants_match_spec",
  "trickle_burst_coalesces_to_three_ms_cadence",
  "fat_burst_flushes_immediately_via_byte_threshold",
]
clauseref = "CLAUDE.md §4 'PTY-thread redraw coalescing'"
severity = "block"

